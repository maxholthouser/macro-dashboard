name: Refresh Macro Data (Safe)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh data with hard timeout
        env:
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
        run: |
          timeout 240 python3 scripts/update_macro_data.py
        shell: bash

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/macro-data.js; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/macro-data.js
          git commit -m "chore: refresh macro dashboard data"
          git push
        shell: bash
